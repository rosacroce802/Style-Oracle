<style>
/* Style Oracle — Color tokens
 * A warm editorial monochrome base. Champagne gold is the single brand accent.
 * The "oracle" iridescent gradient is reserved ONLY for AI-generated moments.
 */
:root {
  /* —— Base neutrals (warm) —— */
  --ink-900: #141110;   /* near-black, warm */
  --ink-800: #221d1a;
  --ink-700: #352e29;
  --ink-600: #5a4f47;
  --ink-500: #847568;   /* muted taupe */
  --ink-400: #a89a8c;
  --ink-300: #c8bcae;
  --ink-200: #e2d9cd;
  --ink-100: #efe8dd;
  --bone-50: #f6f1e9;   /* warm off-white page */
  --bone-0:  #fbf8f2;   /* lightest surface */
  --white:   #ffffff;

  /* —— Oracle plum (deep mystique surface) —— */
  --plum-900: #16111a;
  --plum-800: #1f1726;
  --plum-700: #2c2135;
  --plum-500: #4a3a58;
  --plum-300: #9a87a9;

  /* —— Brand accent: champagne gold —— */
  --gold-700: #8a6d3c;
  --gold-600: #a8854c;
  --gold-500: #c2a06b;  /* primary accent */
  --gold-400: #d4b685;
  --gold-300: #e6d3af;
  --gold-100: #f3e9d6;

  /* —— Iridescent oracle stops (generative only) —— */
  --irid-champagne: #e8d3a8;
  --irid-blush:     #e7b4c4;
  --irid-lilac:     #c0aee6;
  --irid-ice:       #abd6e0;
  --irid-mint:      #b7e0c4;

  /* —— Semantic (muted, editorial) —— */
  --sage-500:  #6f8a6a;  /* success */
  --clay-500:  #b5604a;  /* error / danger */
  --amber-500: #c79a3e;  /* warning */
  --slate-500: #5d7384;  /* info */

  /* —— Semantic aliases —— */
  --bg-page:        var(--bone-50);
  --bg-raised:      var(--bone-0);
  --bg-sunken:      var(--ink-100);
  --bg-inverse:     var(--ink-900);
  --bg-oracle:      var(--plum-900);

  --surface-card:   var(--bone-0);
  --surface-overlay: var(--white);

  --text-strong:    var(--ink-900);
  --text-body:      var(--ink-800);
  --text-muted:     var(--ink-500);
  --text-faint:     var(--ink-400);
  --text-on-dark:   var(--bone-50);
  --text-on-gold:   var(--ink-900);
  --text-accent:    var(--gold-600);

  --border-hair:    color-mix(in srgb, var(--ink-900) 12%, transparent);
  --border-strong:  color-mix(in srgb, var(--ink-900) 28%, transparent);
  --border-gold:    color-mix(in srgb, var(--gold-500) 55%, transparent);

  --accent:         var(--gold-500);
  --accent-hover:   var(--gold-600);
  --accent-press:   var(--gold-700);
  --focus-ring:     color-mix(in srgb, var(--gold-500) 60%, transparent);

  /* Gradients */
  --grad-oracle: linear-gradient(110deg, var(--irid-champagne) 0%, var(--irid-blush) 28%, var(--irid-lilac) 55%, var(--irid-ice) 78%, var(--irid-mint) 100%);
  --grad-gold:   linear-gradient(120deg, var(--gold-400), var(--gold-600));
  --grad-veil:   linear-gradient(180deg, transparent, color-mix(in srgb, var(--ink-900) 70%, transparent));
}

/* Style Oracle — Typography tokens
 * Trirong for editorial display (modern Thai + Latin); Hanken Grotesk for UI; Space Mono for data.
 */
:root {
  --font-display: 'Trirong', Georgia, 'Times New Roman', serif;
  --font-sans:    'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono:    'Space Mono', 'SF Mono', ui-monospace, monospace;

  /* Type scale (display is serif & large; UI is sans) */
  --fs-display-xl: clamp(56px, 9vw, 132px); /* @kind font */
  --fs-display-l:  clamp(44px, 6vw, 84px);  /* @kind font */
  --fs-display-m:  clamp(34px, 4vw, 56px);  /* @kind font */
  --fs-display-s:  28px; /* @kind font */

  --fs-heading-l:  22px; /* @kind font */
  --fs-heading-m:  18px; /* @kind font */
  --fs-heading-s:  16px; /* @kind font */

  --fs-body-l:     17px; /* @kind font */
  --fs-body-m:     15px; /* @kind font */
  --fs-body-s:     13px; /* @kind font */
  --fs-label:      12px; /* @kind font */
  --fs-micro:      11px; /* @kind font */

  /* Line heights */
  --lh-tight:   1.04; /* @kind font */
  --lh-display: 1.1;  /* @kind font */
  --lh-snug:    1.3;  /* @kind font */
  --lh-body:    1.6;  /* @kind font */

  /* Weights */
  --fw-light:    300; /* @kind font */
  --fw-regular:  400; /* @kind font */
  --fw-medium:   500; /* @kind font */
  --fw-semibold: 600; /* @kind font */
  --fw-bold:     700; /* @kind font */

  /* Tracking */
  --tk-display: -0.02em; /* @kind font */
  --tk-tight:   -0.01em; /* @kind font */
  --tk-normal:  0;        /* @kind font */
  --tk-label:   0.18em;   /* @kind font */ /* wide eyebrow caps */
  --tk-mono:    0.04em;   /* @kind font */
}

/* Style Oracle — Spacing & layout tokens (4px base) */
:root {
  --sp-0:  0; /* @kind spacing */
  --sp-1:  4px;
  --sp-2:  8px;
  --sp-3:  12px;
  --sp-4:  16px;
  --sp-5:  20px;
  --sp-6:  24px;
  --sp-8:  32px;
  --sp-10: 40px;
  --sp-12: 48px;
  --sp-16: 64px;
  --sp-20: 80px;
  --sp-24: 96px;
  --sp-32: 128px;

  /* Container widths */
  --container-sm:  640px;
  --container-md:  960px;
  --container-lg:  1200px;
  --container-xl:  1440px;
  --gutter:        clamp(20px, 5vw, 80px); /* @kind spacing */

  /* Mobile frame */
  --mobile-w: 390px;
  --mobile-h: 844px;
}

/* Style Oracle — Radii, borders, shadows, motion */
:root {
  /* Radii — crisp & editorial */
  --r-xs:   2px;
  --r-sm:   4px;
  --r-md:   8px;
  --r-lg:   14px;
  --r-xl:   22px;
  --r-pill: 999px;

  /* Border widths */
  --bw-hair: 1px;
  --bw-bold: 1.5px;

  /* Shadows — warm-tinted, low & precise */
  --sh-xs: 0 1px 2px color-mix(in srgb, var(--ink-900) 8%, transparent);
  --sh-sm: 0 2px 8px color-mix(in srgb, var(--ink-900) 9%, transparent);
  --sh-md: 0 8px 24px color-mix(in srgb, var(--ink-900) 12%, transparent);
  --sh-lg: 0 20px 48px color-mix(in srgb, var(--ink-900) 16%, transparent);
  --sh-xl: 0 32px 80px color-mix(in srgb, var(--ink-900) 22%, transparent);
  --sh-inset: inset 0 1px 0 color-mix(in srgb, var(--white) 50%, transparent);

  /* Oracle glow — only for generative/shimmer elements */
  --glow-oracle: 0 0 0 1px color-mix(in srgb, var(--irid-lilac) 40%, transparent),
                 0 8px 40px color-mix(in srgb, var(--irid-lilac) 30%, transparent),
                 0 2px 16px color-mix(in srgb, var(--irid-champagne) 35%, transparent);
  --glow-gold:   0 0 0 1px var(--border-gold), 0 6px 24px color-mix(in srgb, var(--gold-500) 28%, transparent);

  /* Motion */
  --ease-out:    cubic-bezier(0.2, 0.8, 0.2, 1); /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */
  --ease-warp:   cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */
  --dur-fast:   140ms; /* @kind other */
  --dur-base:   240ms; /* @kind other */
  --dur-slow:   480ms; /* @kind other */
  --dur-warp:   900ms; /* @kind other */
}

/* Style Oracle — Base resets, defaults & shared keyframes */
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--fs-body-m);
  line-height: var(--lh-body);
  color: var(--text-body);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4 { margin: 0; font-weight: var(--fw-regular); color: var(--text-strong); }

/* Editorial eyebrow label */
.so-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--fs-label);
  font-weight: var(--fw-semibold);
  letter-spacing: var(--tk-label);
  text-transform: uppercase;
  color: var(--text-muted);
}

/* Iridescent text fill — generative moments only */
.so-irid-text {
  background: var(--grad-oracle);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

::selection { background: color-mix(in srgb, var(--gold-500) 35%, transparent); }

/* —— Shared keyframes —— */
@keyframes so-shimmer {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
@keyframes so-warp-in {
  0%   { opacity: 0; transform: perspective(900px) rotateX(8deg) scale(0.94) translateY(14px); filter: blur(8px); }
  60%  { opacity: 1; filter: blur(0); }
  100% { opacity: 1; transform: perspective(900px) rotateX(0) scale(1) translateY(0); filter: blur(0); }
}
@keyframes so-glitter {
  0%   { opacity: 0; transform: scale(0) rotate(0deg); }
  40%  { opacity: 1; }
  100% { opacity: 0; transform: scale(1.4) rotate(120deg); }
}
@keyframes so-sweep {
  0%   { transform: translateX(-120%) skewX(-12deg); opacity: 0; }
  30%  { opacity: 1; }
  100% { transform: translateX(220%) skewX(-12deg); opacity: 0; }
}
@keyframes so-rise {
  0%   { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes so-pulse-glow {
  0%, 100% { box-shadow: var(--glow-oracle); }
  50%      { box-shadow: 0 0 0 1px color-mix(in srgb, var(--irid-blush) 50%, transparent), 0 10px 56px color-mix(in srgb, var(--irid-lilac) 40%, transparent); }
}

/* ============================================================
   STYLE ORACLE — APP LAYER
   Components rewired onto the design-system tokens above.
   Iridescent "oracle" gradient is used ONLY for generative
   moments: the emblem, the cast button, and the reveal accent.
   ============================================================ */

/* Thai-aware font stacks (Trirong & IBM Plex Sans Thai carry Thai glyphs;
   Hanken Grotesk is Latin and falls back to Plex Thai for Thai text). */
:root{
  --font-display:'Trirong','IBM Plex Sans Thai',Georgia,serif;
  --font-sans:'Hanken Grotesk','IBM Plex Sans Thai',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'Space Mono','IBM Plex Sans Thai',ui-monospace,monospace;
}

html{scroll-behavior:smooth;}
body{
  /* warm bone page + faint iridescent veils at the corners */
  background:
    radial-gradient(60vmax 60vmax at 88% -12%, color-mix(in srgb, var(--irid-lilac) 16%, transparent), transparent 60%),
    radial-gradient(55vmax 55vmax at -12% 112%, color-mix(in srgb, var(--irid-blush) 14%, transparent), transparent 60%),
    var(--bg-page);
  background-attachment:fixed;
}
h1,h2,h3,h4,p,span,label,button,div,li,a{overflow-wrap:break-word;word-break:normal;line-break:auto;}
.display{font-family:var(--font-display);}

.wrap{max-width:var(--container-md);margin:0 auto;padding:0 var(--gutter);}

/* —— Header —— */
header.top{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
  background:color-mix(in srgb, var(--bg-page) 82%, transparent);border-bottom:var(--bw-hair) solid var(--border-hair);}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);padding:var(--sp-3) 0;}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:var(--fw-medium);
  font-size:24px;color:var(--text-strong);}
.brand .mk{width:26px;height:26px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--plum-900);
  font-size:13px;background:var(--grad-oracle);box-shadow:var(--sh-xs);}
.lang{display:flex;border:var(--bw-hair) solid var(--border-hair);border-radius:var(--r-pill);overflow:hidden;background:var(--surface-card);}
.lang button{border:0;background:transparent;padding:7px 16px;font-family:var(--font-sans);font-weight:var(--fw-medium);
  color:var(--text-muted);cursor:pointer;font-size:var(--fs-body-s);transition:all var(--dur-base) var(--ease-out);}
.lang button.active{background:var(--ink-900);color:var(--bone-50);}

/* —— Hero —— */
.hero{text-align:center;padding:var(--sp-16) 0 var(--sp-6);}
.emblem{width:88px;height:88px;margin:0 auto var(--sp-5);border-radius:50%;display:grid;place-items:center;
  color:var(--plum-900);font-size:2rem;background:var(--grad-oracle);background-size:220% 220%;
  box-shadow:var(--glow-oracle);animation:so-shimmer 5s linear infinite, so-float 6s var(--ease-in-out) infinite;}
@keyframes so-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hero h1{font-family:var(--font-display);font-weight:var(--fw-light);font-size:var(--fs-display-m);
  margin:0 0 var(--sp-2);letter-spacing:var(--tk-display);line-height:var(--lh-display);color:var(--text-strong);}
.hero p.sub{font-size:var(--fs-body-l);color:var(--text-body);max-width:60ch;margin:0 auto;line-height:var(--lh-body);}
.hero .hint{margin-top:var(--sp-4);font-size:var(--fs-label);letter-spacing:var(--tk-label);text-transform:uppercase;
  color:var(--text-accent);font-weight:var(--fw-semibold);}

/* —— Modules —— */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:var(--sp-4);margin:var(--sp-8) 0;}
.module{background:var(--surface-card);border:var(--bw-hair) solid var(--border-hair);border-radius:var(--r-lg);
  padding:var(--sp-5);box-shadow:var(--sh-sm);}
.module.wide{grid-column:1/-1;}
.module h3{font-family:var(--font-sans);font-weight:var(--fw-semibold);font-size:var(--fs-heading-s);
  margin:0 0 var(--sp-1);display:flex;align-items:center;gap:8px;color:var(--text-strong);}
.module h3 .ico{font-size:1.15rem;}
.opt-note{font-size:var(--fs-body-s);color:var(--text-muted);margin:0 0 var(--sp-3);}

/* —— Chips —— */
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{border:var(--bw-hair) solid var(--border-hair);background:var(--bg-raised);border-radius:var(--r-pill);
  padding:7px 14px;font-size:var(--fs-body-s);font-weight:var(--fw-medium);cursor:pointer;user-select:none;
  line-height:1.4;color:var(--text-body);transition:all var(--dur-base) var(--ease-out);}
.chip:hover{border-color:var(--border-gold);color:var(--text-strong);}
.chip.sel{background:var(--ink-900);color:var(--bone-50);border-color:var(--ink-900);}
.chip .src{font-size:.7rem;opacity:.65;margin-left:5px;}
.chip.sel .src{opacity:.85;}

/* —— Buttons —— */
.row{display:flex;flex-wrap:wrap;gap:8px;margin-top:var(--sp-3);}
.ghost{border:var(--bw-hair) solid var(--border-hair);background:var(--bg-raised);color:var(--text-strong);
  border-radius:var(--r-pill);padding:9px 16px;font-family:var(--font-sans);font-weight:var(--fw-semibold);
  font-size:var(--fs-body-s);cursor:pointer;transition:all var(--dur-base) var(--ease-out);}
.ghost:hover{background:color-mix(in srgb, var(--ink-900) 6%, transparent);border-color:var(--border-strong);}
.ghost.solid{background:var(--ink-900);color:var(--bone-50);border-color:var(--ink-900);}
.ghost.solid:hover{background:var(--ink-700);}
.ghost:active,.chip:active{transform:scale(0.97);}

/* —— Recommendation panel —— */
.reco{margin-top:var(--sp-3);font-size:var(--fs-body-s);color:var(--text-body);background:var(--gold-100);
  border:var(--bw-hair) solid var(--border-gold);border-left:3px solid var(--accent);
  border-radius:var(--r-md);padding:11px 13px;display:none;line-height:var(--lh-snug);}
.reco.show{display:block;}

/* —— Inputs —— */
.field{display:flex;flex-direction:column;gap:7px;}
label.lbl{font-size:var(--fs-body-s);color:var(--text-muted);font-family:var(--font-sans);}
input[type=text],input[type=date],select{width:100%;padding:11px 13px;border-radius:var(--r-md);
  border:var(--bw-hair) solid var(--border-hair);background:var(--surface-card);font-family:var(--font-sans);
  font-size:var(--fs-body-m);color:var(--text-strong);transition:border-color var(--dur-fast) var(--ease-out);}
input::placeholder{color:var(--text-faint);}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-ring);}

/* —— Photo dropzone & swatches —— */
.drop{border:var(--bw-bold) dashed var(--border-gold);border-radius:var(--r-md);padding:var(--sp-4);
  text-align:center;background:var(--gold-100);cursor:pointer;font-family:var(--font-sans);
  font-weight:var(--fw-medium);font-size:var(--fs-body-s);color:var(--text-accent);transition:all var(--dur-base) var(--ease-out);}
.drop:hover{background:var(--gold-300);}
.pc-result{margin-top:var(--sp-3);display:none;align-items:flex-start;gap:13px;}
.pc-swatch{width:50px;height:50px;border-radius:var(--r-md);border:2px solid var(--white);box-shadow:var(--sh-sm);flex:0 0 auto;}
.pc-text{font-size:var(--fs-body-m);flex:1;min-width:150px;color:var(--text-body);}
.swatch-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.sw{width:28px;height:28px;border-radius:var(--r-sm);border:2px solid var(--white);box-shadow:var(--sh-xs);}

/* —— Lucky preview & angel —— */
.luck-prev{margin-top:11px;display:none;align-items:center;gap:11px;}
.luck-dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--white);box-shadow:var(--sh-sm);}
.luck-prev span{font-size:var(--fs-body-m);color:var(--text-body);}
.angel-card{background:var(--bg-sunken);border:var(--bw-hair) solid var(--border-hair);border-radius:var(--r-md);
  padding:var(--sp-4);text-align:center;}
.angel-card .ang-emoji{font-size:2rem;}
.angel-card .ang-name{font-family:var(--font-display);font-weight:var(--fw-medium);font-size:1.25rem;
  font-style:italic;color:var(--text-accent);margin:3px 0;}
.angel-card .ang-msg{font-size:var(--fs-body-s);color:var(--text-muted);}

/* —— Cast button (signature generative moment) —— */
.cast-wrap{text-align:center;margin:var(--sp-10) 0 var(--sp-4);}
.cast{border:0;border-radius:var(--r-pill);padding:22px 60px;font-family:var(--font-sans);font-weight:var(--fw-bold);
  font-size:clamp(20px,3.6vw,26px);color:var(--plum-900);cursor:pointer;letter-spacing:.2px;
  background:var(--grad-oracle);background-size:200% 100%;background-position:0% 50%;
  box-shadow:var(--sh-md);transition:background-position var(--dur-slow) var(--ease-out),transform var(--dur-fast) var(--ease-out),box-shadow var(--dur-base) var(--ease-out);
  animation:so-pulse-glow 2.8s var(--ease-in-out) infinite;}
.cast:hover{background-position:100% 50%;transform:translateY(-3px) scale(1.02);box-shadow:var(--glow-oracle);}
.cast:active{transform:scale(0.98);}

/* —— Result / Oracle reading —— */
#result{margin:var(--sp-2) 0 var(--sp-8);display:none;animation:so-rise var(--dur-slow) var(--ease-out);}
.verdict{position:relative;background:var(--surface-card);border:var(--bw-hair) solid var(--border-hair);
  border-radius:var(--r-xl);padding:var(--sp-8) var(--sp-6);box-shadow:var(--sh-lg);text-align:center;overflow:hidden;}
.verdict::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-oracle);}
.eyebrow{font-family:var(--font-sans);letter-spacing:var(--tk-label);font-size:var(--fs-label);
  text-transform:uppercase;color:var(--text-accent);font-weight:var(--fw-semibold);}
.verdict h2{font-family:var(--font-display);font-weight:var(--fw-light);font-size:var(--fs-display-s);
  margin:var(--sp-2) 0 var(--sp-1);letter-spacing:var(--tk-tight);color:var(--text-strong);}
.verdict .persona{font-size:var(--fs-body-l);color:var(--text-body);max-width:64ch;margin:var(--sp-2) auto 0;}
.tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:var(--sp-4) 0 var(--sp-1);}
.tag{background:var(--bg-sunken);border:var(--bw-hair) solid var(--border-hair);border-radius:var(--r-pill);
  padding:5px 13px;font-size:var(--fs-body-s);color:var(--text-body);}
.palette-show{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:var(--sp-4) 0;}
.palette-show .sw{width:40px;height:40px;}
.palette-show.big{gap:9px;margin:var(--sp-2) 0 var(--sp-1);}
.palette-show.big .sw{width:44px;height:44px;border-radius:var(--r-md);}

.colorblock{margin:var(--sp-5) 0 var(--sp-1);}
.cb-head{font-family:var(--font-sans);font-weight:var(--fw-semibold);font-size:var(--fs-heading-s);
  margin:var(--sp-4) 0 2px;color:var(--text-accent);}
.cb-head.bad{color:var(--clay-500);}
.cb-note{font-size:var(--fs-body-s);color:var(--text-muted);max-width:58ch;margin:var(--sp-2) auto 0;}

.board-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;
  margin:var(--sp-5) auto var(--sp-1);background:#e60023;color:#fff;border-radius:var(--r-pill);
  padding:16px 34px;font-family:var(--font-sans);font-weight:var(--fw-semibold);font-size:var(--fs-body-l);
  box-shadow:var(--sh-md);transition:transform var(--dur-fast) var(--ease-out),box-shadow var(--dur-base) var(--ease-out);}
.board-btn:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);}
.looks{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:var(--sp-3);margin-top:var(--sp-5);}
.look{border-radius:var(--r-lg);overflow:hidden;background:var(--surface-card);box-shadow:var(--sh-sm);
  border:var(--bw-hair) solid var(--border-hair);display:flex;flex-direction:column;animation:so-rise var(--dur-slow) both;}
.look .canvas{height:150px;position:relative;display:grid;place-items:center;}
.look .canvas .figure{font-size:3rem;filter:drop-shadow(0 5px 9px rgba(0,0,0,.22));}
.look .canvas .num{position:absolute;top:9px;left:11px;font-family:var(--font-mono);font-weight:var(--fw-bold);
  font-size:var(--fs-body-s);letter-spacing:var(--tk-mono);color:#fff;background:rgba(0,0,0,.22);
  border-radius:var(--r-pill);padding:1px 10px;}
.look .body{padding:var(--sp-4);flex:1;display:flex;flex-direction:column;gap:7px;}
.look .body h4{margin:0;font-family:var(--font-display);font-weight:var(--fw-medium);font-size:1.1rem;color:var(--text-strong);}
.look .body p{margin:0;font-size:var(--fs-body-s);color:var(--text-muted);flex:1;}
.pin-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;
  background:#e60023;color:#fff;border-radius:var(--r-pill);padding:8px 13px;font-family:var(--font-sans);
  font-size:var(--fs-body-s);font-weight:var(--fw-medium);transition:filter var(--dur-base) var(--ease-out);}
.pin-btn:hover{filter:brightness(.92);}

.blessing{margin-top:var(--sp-5);background:var(--gold-100);border:var(--bw-hair) solid var(--border-gold);
  border-radius:var(--r-lg);padding:var(--sp-6);text-align:center;}
.blessing .b-ico{font-size:1.6rem;color:var(--text-accent);}
.blessing p{font-size:var(--fs-body-l);margin:7px auto 0;max-width:64ch;color:var(--text-body);font-family:var(--font-display);font-style:italic;font-weight:var(--fw-regular);}

/* —— Support / tip —— */
.support{text-align:center;margin:var(--sp-3) 0 var(--sp-8);padding:6px var(--sp-4);}
.sup-line{font-size:var(--fs-body-s);color:var(--text-muted);max-width:52ch;margin:0 auto var(--sp-3);}
.bank{display:inline-flex;flex-direction:column;gap:3px;align-items:center;background:var(--bg-sunken);
  border:var(--bw-hair) solid var(--border-hair);border-radius:var(--r-md);padding:13px var(--sp-5);}
.bank .who{font-family:var(--font-sans);font-weight:var(--fw-medium);font-size:var(--fs-body-m);color:var(--text-body);}
.bank .acct{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.bank .acct .no{font-family:var(--font-mono);font-size:var(--fs-body-m);font-weight:var(--fw-bold);
  letter-spacing:var(--tk-mono);color:var(--text-strong);}
.bank .label{font-size:var(--fs-micro);letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);}
.copy-btn{border:0;background:var(--ink-900);color:var(--bone-50);border-radius:var(--r-pill);
  padding:7px 14px;font-family:var(--font-sans);font-size:var(--fs-body-s);font-weight:var(--fw-medium);
  cursor:pointer;transition:background var(--dur-base) var(--ease-out);}
.copy-btn:hover{background:var(--ink-700);}

/* —— DOB row —— */
.dob-box{margin-top:var(--sp-4);}
.dob-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:6px;}
.dob-row input[type=date]{max-width:200px;}

footer{text-align:center;padding:var(--sp-5) var(--sp-4) var(--sp-10);color:var(--text-muted);
  font-size:var(--fs-body-s);font-family:var(--font-sans);}

@media (prefers-reduced-motion:reduce){*{animation:none!important}html{scroll-behavior:auto}}
</style>

<body>
<header class="top">
  <div class="wrap top-row">
    <div class="brand"><span class="mk">✦</span><span id="brandName">Style Oracle</span></div>
    <div class="lang">
      <button id="btn-th" class="active" onclick="setLang('th')">ไทย</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <div class="emblem">✦</div>
    <h1 class="display" id="heroTitle"></h1>
    <p class="sub" id="heroSub"></p>
    <p class="hint" id="heroHint"></p>
  </section>

  <section class="grid">
    <!-- GENDER -->
    <div class="module">
      <h3><span class="ico">🧑‍🤝‍🧑</span><span data-i="m_gender"></span></h3>
      <p class="opt-note" data-i="gender_note"></p>
      <div class="chips" id="genderChips"></div>
    </div>

    <!-- MOOD -->
    <div class="module">
      <h3><span class="ico">🎭</span><span data-i="m_mood"></span></h3>
      <p class="opt-note" data-i="optional"></p>
      <div class="chips" id="moodChips"></div>
    </div>

    <!-- BIRTHDAY -->
    <div class="module">
      <h3><span class="ico">🎂</span><span data-i="m_birth"></span></h3>
      <p class="opt-note" data-i="optional"></p>
      <div class="field">
        <label class="lbl" data-i="birth_pick"></label>
        <select id="daySelect" onchange="updateLuck()"></select>
      </div>
      <div class="luck-prev" id="luckPrev"><div class="luck-dot" id="luckDot"></div><span id="luckText"></span></div>
    </div>

    <!-- GOAL -->
    <div class="module">
      <h3><span class="ico">🎯</span><span data-i="m_goal"></span></h3>
      <p class="opt-note" data-i="optional"></p>
      <div class="chips" id="goalChips"></div>
    </div>

    <!-- STYLE -->
    <div class="module wide">
      <h3><span class="ico">🧶</span><span data-i="m_style"></span></h3>
      <p class="opt-note" data-i="style_note"></p>
      <div class="chips" id="styleChips"></div>
      <div class="dob-box">
        <label class="lbl" data-i="dob_label"></label>
        <div class="dob-row">
          <input type="date" id="dobInput" max="2025-12-31">
          <button class="ghost solid" onclick="recommendStyle()" data-i="reco_style"></button>
        </div>
      </div>
      <div class="row">
        <button class="ghost" onclick="randomStyle()" data-i="random_style"></button>
      </div>
      <div class="reco" id="styleReco"></div>
    </div>

    <!-- VIBE / CHARACTER -->
    <div class="module wide">
      <h3><span class="ico">🎬</span><span data-i="m_vibe"></span></h3>
      <p class="opt-note" data-i="vibe_note"></p>
      <div class="field">

function buildChips(arr,id,key){
  const c=document.getElementById(id);c.innerHTML='';
  arr.forEach(item=>{
    const el=document.createElement('div');el.className='chip'+(state[key]===item.id?' sel':'');
    el.innerHTML=(item.emoji?item.emoji+' ':'')+'<span>'+item[LANG]+'</span>';
    el.onclick=()=>{
      if(state[key]===item.id){state[key]=null;}
      else{state[key]=item.id;}
      buildChips(arr,id,key);
    };
    c.appendChild(el);
  });
}

function lifePath(y,m,d){
  const reduce=n=>{while(n>9&&n!==11&&n!==22&&n!==33){n=String(n).split('').reduce((a,c)=>a+(+c),0);}return n;};
  return reduce(reduce(y)+reduce(m)+reduce(d));
}

function rgb2lab(r,g,b){
  let R=r/255,G=g/255,B=b/255;
  R=R>0.04045?Math.pow((R+0.055)/1.055,2.4):R/12.92;
  G=G>0.04045?Math.pow((G+0.055)/1.055,2.4):G/12.92;
  B=B>0.04045?Math.pow((B+0.055)/1.055,2.4):B/12.92;
  let X=(R*0.4124+G*0.3576+B*0.1805)/0.95047,Y=(R*0.2126+G*0.7152+B*0.0722),Z=(R*0.0193+G*0.1192+B*0.9505)/1.08883;
  const f=t=>t>0.008856?Math.cbrt(t):(7.787*t+16/116);X=f(X);Y=f(Y);Z=f(Z);
  return {L:116*Y-16,a:500*(X-Y),b:200*(Y-Z)};
}
function isSkin(R,G,B){
  const Y=0.299*R+0.587*G+0.114*B,Cb=128-0.168736*R-0.331264*G+0.5*B,Cr=128+0.5*R-0.418688*G-0.081312*B;
  const ycc=Cb>=77&&Cb<=135&&Cr>=132&&Cr<=180,mx=Math.max(R,G,B),mn=Math.min(R,G,B);
  const rgbRule=R>55&&G>30&&B>15&&(mx-mn)>10&&Math.abs(R-G)>3&&R>=G&&G>=B;
  return ycc&&rgbRule&&Y>42&&Y<248;
}
function showPcFail(){const res=document.getElementById('pcResult');res.style.display='flex';document.getElementById('pcSwatch').style.background='#ddd';document.getElementById('pcText').textContent=T[LANG].pc_fail;}
function mapSeason(warm,value,chroma){ // value:0 light 1 med 2 deep · chroma:0 soft 1 med 2 clear
  if(warm){
    if(value===0)return chroma===2?'bright_spring':chroma===0?'light_spring':'true_spring';
    if(value===2)return chroma===0?'soft_autumn':'deep_autumn';
    return chroma===0?'soft_autumn':chroma===2?'true_spring':'true_autumn';
  }else{
    if(value===0)return chroma===0?'light_summer':chroma===2?'bright_winter':'true_summer';
    if(value===2)return chroma===2?'bright_winter':chroma===0?'true_winter':'deep_winter';
    return chroma===0?'soft_summer':chroma===2?'true_winter':'true_summer';
  }
}
document.getElementById('photoInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const img=new Image();img.onload=()=>analyzePhoto(img);img.src=URL.createObjectURL(f);
});
function analyzePhoto(img){
  const c=document.createElement('canvas');const w=c.width=Math.min(img.naturalWidth,300);const h=c.height=Math.round(img.naturalHeight*(w/img.naturalWidth));
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
  let data;try{data=ctx.getImageData(0,0,w,h).data;}catch(e){showPcFail();return;}
  const collect=(x0,x1,y0,y1)=>{const o=[];for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){const i=(y*w+x)*4,R=data[i],G=data[i+1],B=data[i+2],A=data[i+3];if(A<200)continue;if(isSkin(R,G,B))o.push([R,G,B,0.299*R+0.587*G+0.114*B]);}return o;};
  let pix=collect(Math.floor(w*0.18),Math.ceil(w*0.82),Math.floor(h*0.10),Math.ceil(h*0.72));
  if(pix.length<80)pix=collect(0,w,0,h);
  if(pix.length<40){showPcFail();return;}
  pix.sort((p,q)=>p[3]-q[3]);const lo=Math.floor(pix.length*0.15),hi=Math.ceil(pix.length*0.85),keep=pix.slice(lo,hi);
  let r=0,g=0,b=0;keep.forEach(p=>{r+=p[0];g+=p[1];b+=p[2];});r=Math.round(r/keep.length);g=Math.round(g/keep.length);b=Math.round(b/keep.length);
  const lab=rgb2lab(r,g,b);
  const hue=Math.atan2(lab.b,lab.a)*180/Math.PI;
  const ita=Math.atan2(lab.L-50,lab.b)*180/Math.PI;
  const chromaC=Math.sqrt(lab.a*lab.a+lab.b*lab.b);
  const warm=hue>=51;
  let undertone=hue>=55?'warm':hue<=45?'cool':'neutral';
  if(undertone==='neutral'&&lab.b<22&&lab.L<68)undertone='olive';
  const value=ita>40?0:ita<8?2:1;
  const chroma=chromaC>=33?2:chromaC<=20?0:1;
  let depthIdx=ita>48?0:ita>30?1:ita>12?2:ita>-15?3:4;
  const season=mapSeason(warm||undertone==='olive',value,chroma);
  state.season=season;document.getElementById('seasonSelect').value=season;renderSeasonSwatches();
  const res=document.getElementById('pcResult');res.style.display='flex';
  document.getElementById('pcSwatch').style.background=`rgb(${r},${g},${b})`;
  const toneWord=T[LANG][undertone]||undertone;const depthWord=T[LANG].depthLabels[depthIdx];
  const dot=col=>`<span style="display:inline-block;width:15px;height:15px;border-radius:4px;background:${col};border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);vertical-align:middle;margin-right:3px"></span>`;
  const bestDots=SEASONS[season].palette.map(dot).join('');
  const lowConf=keep.length<120?`<br><span style="font-size:.8em;color:var(--ink-soft)">${T[LANG].conf_low}</span>`:'';
  document.getElementById('pcText').innerHTML=
    `<b style="color:var(--lav-deep)">${SEASONS[season][LANG]}</b><br>
     <span style="font-size:.9em">${T[LANG].pc_under}: <b>${toneWord}</b> · ${T[LANG].pc_depth}: <b>${depthWord}</b></span><br>
     <span style="font-size:.85em;color:var(--ink-soft)">${SEASONS[season].desc[LANG]}</span><br>
     <span style="font-size:.85em"><b>${T[LANG].pc_best}:</b> ${bestDots}</span><br>
     <span style="font-size:.82em;color:var(--ink-soft)">⚠️ ${T[LANG].pc_avoid}: ${SEASONS[season].avoid[LANG]}</span>${lowConf}`;
}

/* ============ HELPERS ============ */
function resolveVibe(){
  if(state.vibeCustom)return {name:state.vibeCustom,custom:true,kw:state.vibeCustom+' outfit aesthetic',palette:null};
  if(state.vibeId)return VIBES.find(v=>v.id===state.vibeId);
  return null;
}
function getPalette(){
  if(state.season)return SEASONS[state.season].palette.slice();
  const v=resolveVibe();if(v&&v.palette)return v.palette.slice();
  const s=STYLES.find(x=>x.id===state.style);if(s)return s.palette.slice();
  if(state.day!==null)return DAY_COLORS[state.day].palette.slice();
  return ['#a98fe0','#f0a6c0','#f7c39b','#9cd6f2'];
}
function buildPinQuery(extra){
  const parts=[];
  const gen=GENDER.find(x=>x.id===state.gender),mood=MOODS.find(m=>m.id===state.mood),goal=GOALS.find(g=>g.id===state.goal),style=STYLES.find(s=>s.id===state.style),v=resolveVibe();
  if(gen)parts.push(gen.kw);
  if(v)parts.push(v.kw);
  if(style)parts.push(style.kw);
  if(mood)parts.push(mood.kw);
  if(goal)parts.push(goal.kw);
  if(state.day!==null)parts.push(DAY_COLORS[state.day].en.toLowerCase()+' outfit');
  if(state.season)parts.push(SEASONS[state.season].en.split(' ')[0].toLowerCase()+' palette outfit');
  if(extra)parts.push(extra);
  if(!parts.length)parts.push('aesthetic outfit inspiration');
  return encodeURIComponent(parts.join(' ').replace(/\s+/g,' ').trim());
}

function pickPersona(){
  if(state.mood){const m=PERSONAS.filter(p=>p.moods.includes(state.mood));if(m.length)return m[Math.floor(Math.random()*m.length)];}
  return PERSONAS[Math.floor(Math.random()*PERSONAS.length)];
}
function castSpell(){
  const t=T[LANG];if(!state.angel)rollAngel();
  const vibe=resolveVibe();const style=STYLES.find(s=>s.id===state.style);

  let title = vibe?(isTh()?`โหมด ${vibe.name} ✦`:`${vibe.name} mode ✦`)
            : style?(isTh()?`สไตล์${style.th} ✦`:`${style.en} ✦`)
            : (isTh()?'ลุคแห่งวันของคุณ ✦':'Your look of the day ✦');
  document.getElementById('vibeTitle').textContent=title;

  let pText;
  if(vibe){
    const SR=isTh()?SRC:SRC_EN;
    pText = vibe.custom ? (isTh()?`วันนี้คุณให้ฟีลแบบ ${vibe.name} — เสกลุคในแบบที่คุณรัก`:`Today you’re channeling ${vibe.name} — styled your way.`)
                       : (isTh()?`วันนี้คุณให้ฟีลแบบ ${vibe.name} (${SR[vibe.src]}) — ${vibe.aesTh}`:`Channeling ${vibe.name} (${SR[vibe.src]}) — ${vibe.aesEn}`);
  } else { pText=pickPersona()[LANG]; }
  if(style)pText += isTh()?` ผสานสไตล์${style.th}`:` with a ${style.en.toLowerCase()} twist`;
  document.getElementById('personaText').textContent=pText;

  const tagBox=document.getElementById('vibeTags');tagBox.innerHTML='';
  const addTag=(e,x)=>{const s=document.createElement('span');s.className='tag';s.textContent=e+' '+x;tagBox.appendChild(s);};
  if(state.gender){const o=GENDER.find(x=>x.id===state.gender);addTag(o.emoji,o[LANG]);}
  if(state.mood){const o=MOODS.find(x=>x.id===state.mood);addTag(o.emoji,o[LANG]);}
  if(state.goal){const o=GOALS.find(x=>x.id===state.goal);addTag(o.emoji,o[LANG]);}
  if(style)addTag(style.emoji,style[LANG]);
  if(state.day!==null)addTag('🎀',(isTh()?'สีมงคล: ':'Lucky: ')+DAY_COLORS[state.day][LANG]);
  if(state.season)addTag('🎨',SEASONS[state.season][LANG]);
  if(state.angel)addTag(state.angel.emoji,state.angel.name);
  if(!tagBox.children.length)addTag('✨',t.cast_empty);

  const pal=getPalette();
  // recommended + avoid colours
  const dots=(arr,box)=>{const el=document.getElementById(box);el.innerHTML='';arr.forEach(col=>{const s=document.createElement('div');s.className='sw';s.style.background=col;el.appendChild(s);});};
  let rec, bad=null;
  if(state.season&&SEASON_COLORS[state.season]){rec=SEASON_COLORS[state.season].best;bad=SEASON_COLORS[state.season].bad;}
  else{ const base=pal.slice(); while(base.length<8){base.push(pal[base.length%pal.length]);} rec=base.slice(0,Math.max(8,pal.length)); }
  dots(rec,'recColors');
  const avoidHead=document.getElementById('avoidHead'),avoidBox=document.getElementById('avoidColors'),avoidNote=document.getElementById('avoidNote');
  if(bad){dots(bad,'avoidColors');avoidHead.style.display='';avoidBox.style.display='';avoidNote.textContent=SEASONS[state.season].avoid[LANG];avoidNote.style.display='';}
  else{document.getElementById('avoidColors').innerHTML='';avoidHead.style.display='none';avoidBox.style.display='none';avoidNote.textContent=t.avoid_need;avoidNote.style.display='';}

  // big Pinterest board button
  const q=buildPinQuery();
  const board=document.getElementById('boardBtn');
  board.href='https://www.pinterest.com/search/pins/?q='+q;
  board.textContent='📌 '+t.view_board;

  const grid=document.getElementById('looksGrid');grid.innerHTML='';
  const figSet=FIGURES[state.gender]||FIGURES.any;
  const count=3+Math.floor(Math.random()*3);
  const templates=[...LOOK_TEMPLATES].sort(()=>Math.random()-0.5).slice(0,count);
  templates.forEach((tpl,i)=>{
    const c1=pal[i%pal.length],c2=pal[(i+1)%pal.length],c3=pal[(i+2)%pal.length];
    const card=document.createElement('div');card.className='look';card.style.animationDelay=(i*0.07)+'s';
    const qq=buildPinQuery(tpl.en.toLowerCase());
    card.innerHTML=`<div class="canvas" style="background:linear-gradient(150deg,${c1},${c2} 60%,${c3})"><span class="num">0${i+1}</span><span class="figure">${figSet[i%figSet.length]}</span></div>
      <div class="body"><h4>${tpl[LANG]}</h4><p>${isTh()?tpl.descTh:tpl.descEn}</p>
      <a class="pin-btn" target="_blank" rel="noopener" href="https://www.pinterest.com/search/pins/?q=${qq}">📌 ${t.pin}</a></div>`;
    grid.appendChild(card);
  });

  document.getElementById('blessingText').textContent=makeBlessing();
  const r=document.getElementById('result');r.style.display='block';r.scrollIntoView({behavior:'smooth',block:'start'});
}
